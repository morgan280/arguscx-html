    <script>
document.addEventListener('DOMContentLoaded', () => {
  let observer = null;
  if ('IntersectionObserver' in window) {
    observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
  }

  const observed = new WeakSet();

  function attachReveal(el) {
    if (observed.has(el)) return;
    observed.add(el);
    if (observer) {
      observer.observe(el);
    } else {
      el.classList.add('visible');
    }
  }

  function scanReveals() {
    document.querySelectorAll('.reveal').forEach(attachReveal);
  }

  scanReveals();
  const root = document.getElementById('root');
  if (root) {
    new MutationObserver(scanReveals).observe(root, { childList: true, subtree: true });
  }

  setTimeout(() => {
    document.querySelectorAll('.reveal').forEach((el) => el.classList.add('visible'));
  }, 3000);
});
</script>
    <script>
(function () {
  var RELOAD_ROUTES = [
    "/",
    "/services",
    "/about",
    "/technology",
    "/industries",
    "/why",
    "/why-argus",
    "/contact",
    "/get-started",
    "/careers",
    "/privacy",
    "/terms",
    "/thank-you",
    "/experience-blue",
    "/experience-red"
  ];

  function normalizePath(href) {
    if (!href) return "";
    var h = href.split("#")[0].split("?")[0];
    h = h.replace(/\.html$/i, "");
    h = h.replace(/\/+$/g, "");
    return h === "" ? "/" : h;
  }

  function shouldForceFullReload(href) {
    if (!href) return false;
    var h = href.trim();
    if (!h || h[0] === "#") return false;
    if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(h)) return false;
    if (h[0] !== "/") h = "/" + h;
    var path = normalizePath(h);
    return RELOAD_ROUTES.indexOf(path) !== -1;
  }

  document.addEventListener(
    "click",
    function (e) {
      var target = e.target;
      if (!target || !target.closest) return;

      var a = target.closest("a[href]");
      if (!a) return;

      var href = a.getAttribute("href");
      if (!shouldForceFullReload(href)) return;

      e.preventDefault();
      e.stopPropagation();
      window.location.href = href;
    },
    true
  );
})();
</script>

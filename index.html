(function () {
  // If the server ever serves index.html for a "*.html" URL (cache/rewrite edge-case),
  // normalize to the clean route so the correct static shell rewrite can apply.
  // Example: /services.html -> /services
  var p = window.location && window.location.pathname;
  if (p && p !== "/index.html" && /\.html$/i.test(p)) {
    window.location.replace(p.replace(/\.html$/i, ""));
  }
})();
</script>
    <script>
document.addEventListener("click", function(e) {
  var el = e.target.closest("div, a, button");
  if (!el) return;
  var text = el.textContent.trim();
  if (text === "ENTER SYSTEM") {
    e.preventDefault();
    window.location.href = "/experience-blue.html";
  }
  if (text === "CONNECT NOW") {
    e.preventDefault();
    window.location.href = "/experience-red.html";
  }
});
</script>
    <script>
(function () {
  var RELOAD_ROUTES = [
    "/",
    "/services",
    "/about",
    "/technology",
    "/industries",
    "/why",
    "/why-argus",
    "/contact",
    "/get-started",
    "/careers",
    "/privacy",
    "/terms",
    "/thank-you",
    "/experience-blue",
    "/experience-red"
  ];

  function normalizePath(href) {
    if (!href) return "";
    var h = href.split("#")[0].split("?")[0];
    h = h.replace(/\.html$/i, "");
    h = h.replace(/\/+$/g, "");
    return h === "" ? "/" : h;
  }

  function shouldForceFullReload(href) {
    if (!href) return false;
    var h = href.trim();
    if (!h || h[0] === "#") return false;

    // Ignore external links (http:, mailto:, etc.)
    if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(h)) return false;

    // Support relative paths like "services.html"
    if (h[0] !== "/") h = "/" + h;

    var path = normalizePath(h);
    return RELOAD_ROUTES.indexOf(path) !== -1;
  }

  document.addEventListener(
    "click",
    function (e) {
      var target = e.target;
      if (!target || !target.closest) return;

      var a = target.closest("a[href]");
      if (!a) return;

      var href = a.getAttribute("href");
      if (!shouldForceFullReload(href)) return;

      e.preventDefault();
      e.stopPropagation();
      window.location.href = href;
    },
    true
  );
})();
</script>

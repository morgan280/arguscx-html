    <script>
document.addEventListener('DOMContentLoaded', () => {
  let observer = null;
  if ('IntersectionObserver' in window) {
    observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
  }

  const observed = new WeakSet();

  function attachReveal(el) {
    if (observed.has(el)) return;
    observed.add(el);
    if (observer) {
      observer.observe(el);
    } else {
      el.classList.add('visible');
    }
  }

  function scanReveals() {
    document.querySelectorAll('.reveal').forEach(attachReveal);
  }

  scanReveals();
  const root = document.getElementById('root');
  if (root) {
    new MutationObserver(scanReveals).observe(root, { childList: true, subtree: true });
  }

  setTimeout(() => {
    document.querySelectorAll('.reveal').forEach((el) => el.classList.add('visible'));
  }, 3000);
});
</script>
    <script>
(function () {
  function getRoot() {
    return document.getElementById('root');
  }

  var pollTimer = null;
  var pollStartedAt = null;
  var observer = null;

  function setupHero() {
    var root = getRoot();
    if (!root) return false;

    // About page hero wrapper uses `hero-subtle`.
    var hero = root.querySelector('section.hero-subtle');
    if (!hero) return false;
    if (hero.querySelector('.hero-bg-image')) return true;

    hero.classList.add('hero-section');

    var img = document.createElement('img');
    img.className = 'hero-bg-image';
    img.src = '/images/about-hero-bg.png';
    img.alt = '';
    img.loading = 'eager';
    img.setAttribute('fetchpriority', 'high');

    var overlay = document.createElement('div');
    overlay.className = 'hero-overlay';

    var frag = document.createDocumentFragment();
    frag.appendChild(img);
    frag.appendChild(overlay);
    hero.insertBefore(frag, hero.firstChild);

    var content =
      hero.querySelector('.container.mx-auto.px-4.text-center') || hero.firstElementChild;
    if (content) content.classList.add('hero-content');

    return true;
  }

  function startPolling() {
    if (pollTimer) return;
    pollStartedAt = Date.now();
    var maxMs = 20000;

    function tick() {
      if (setupHero()) {
        clearInterval(pollTimer);
        pollTimer = null;
        return;
      }
      if (Date.now() - pollStartedAt > maxMs) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    tick();
    pollTimer = setInterval(tick, 150);
  }

  function ensureObserver() {
    if (observer) return;
    var root = getRoot();
    if (!root) return;

    observer = new MutationObserver(function () {
      if (setupHero()) {
        if (observer) observer.disconnect();
        observer = null;
      }
    });
    observer.observe(root, { childList: true, subtree: true });
  }

  function start() {
    ensureObserver();
    startPolling();
    setupHero();
  }

  document.addEventListener('DOMContentLoaded', start);
  window.addEventListener('load', start);
  window.addEventListener('pageshow', start);
})();
</script>

    function findCtaTarget() {

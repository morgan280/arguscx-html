    <script>
document.addEventListener('DOMContentLoaded', () => {
  let observer = null;
  if ('IntersectionObserver' in window) {
    observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
  }

  const observed = new WeakSet();

  function attachReveal(el) {
    if (observed.has(el)) return;
    observed.add(el);
    if (observer) {
      observer.observe(el);
    } else {
      el.classList.add('visible');
    }
  }

  function scanReveals() {
    document.querySelectorAll('.reveal').forEach(attachReveal);
  }

  scanReveals();
  const root = document.getElementById('root');
  if (root) {
    new MutationObserver(scanReveals).observe(root, { childList: true, subtree: true });
  }

  setTimeout(() => {
    document.querySelectorAll('.reveal').forEach((el) => el.classList.add('visible'));
  }, 3000);
});
</script>

    <script>
document.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('js-loaded');

  const root = document.getElementById('root');
  if (!root) return;

  // Exclude nav/footer and the actual hero wrapper(s).
  // Using closest() avoids timing issues during the first React render.
  const isExcluded = (el) =>
    !!el.closest('nav, footer, .hero-grid, .hero-glow, .hero-dots, .hero-subtle, .hero-section');

  function ensureReveal(el, delayClass) {
    if (!el || el.nodeType !== 1) return;
    if (isExcluded(el)) return;
    if (el.classList.contains('reveal')) return;
    el.classList.add('reveal');
    if (delayClass) el.classList.add(delayClass);
  }

  function tagEligible() {
    // Headings & quotes (excluding hero)
    root.querySelectorAll('h2, h3, blockquote').forEach((el) => ensureReveal(el));

    // Content blocks below hero
    root.querySelectorAll('section p, section ul, section ol').forEach((el) => ensureReveal(el));

    // Cards / feature blocks
    root.querySelectorAll('article, [class*="rounded-xl"], [class*="rounded-2xl"], [class*="rounded-lg"][class*="border"]').forEach((el) => ensureReveal(el));

    // Images & icons (inside content)
    root.querySelectorAll('section img, section svg').forEach((el) => ensureReveal(el));

    // CTA sections/buttons/links (inside content)
    root.querySelectorAll('section a, section button').forEach((el) => ensureReveal(el));

    // Stagger for grid rows (cards in a row of 3–4)
    root.querySelectorAll('[class*="grid"]').forEach((grid) => {
      if (isExcluded(grid)) return;
      const kids = Array.from(grid.children).filter((k) => {
        if (!k || k.nodeType !== 1) return false;
        const cls = (k.getAttribute('class') || '');
        return cls.includes('rounded') || cls.includes('border') || !!k.querySelector('[class*="rounded"]');
      });
      kids.slice(0, 4).forEach((card, idx) => {
        const delay = idx === 0 ? null : `reveal-delay-${idx}`;
        ensureReveal(card, delay);
      });
    });
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    },
    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
  );

  function observeReveals() {
    root.querySelectorAll('.reveal').forEach((el) => {
      if (el.dataset.revealObserved === '1') return;
      el.dataset.revealObserved = '1';
      observer.observe(el);
    });
  }

  tagEligible();
  observeReveals();

  new MutationObserver(() => {
    tagEligible();
    observeReveals();
  }).observe(root, { childList: true, subtree: true });
});
    </script>
    <script>
(function () {
  function getRoot() {
    return document.getElementById('root');
  }

  var pollTimer = null;
  var pollStartedAt = null;
  var observer = null;

  function setupHero() {
    var root = getRoot();
    if (!root) return false;

    var hero = root.querySelector('section.hero-grid');
    if (!hero) return false;
    if (hero.querySelector('.hero-bg-image')) return true;

    hero.classList.add('hero-section');

    var img = document.createElement('img');
    img.className = 'hero-bg-image';
    img.src = '/images/services-hero-bg.png';
    img.alt = '';
    img.loading = 'eager';
    img.setAttribute('fetchpriority', 'high');

    var overlay = document.createElement('div');
    overlay.className = 'hero-overlay';

    var frag = document.createDocumentFragment();
    frag.appendChild(img);
    frag.appendChild(overlay);
    hero.insertBefore(frag, hero.firstChild);

    var content =
      hero.querySelector('.container.mx-auto.px-4.text-center') || hero.firstElementChild;
    if (content) content.classList.add('hero-content');

    return true;
  }

  function startPolling() {
    if (pollTimer) return;
    pollStartedAt = Date.now();
    var maxMs = 20000;

    function tick() {
      if (setupHero()) {
        clearInterval(pollTimer);
        pollTimer = null;
        return;
      }
      if (Date.now() - pollStartedAt > maxMs) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    tick();
    pollTimer = setInterval(tick, 150);
  }

  function ensureObserver() {
    if (observer) return;
    var root = getRoot();
    if (!root) return;

    observer = new MutationObserver(function () {
      if (setupHero()) {
        if (observer) observer.disconnect();
        observer = null;
      }
    });
    observer.observe(root, { childList: true, subtree: true });
  }

  function start() {
    ensureObserver();
    startPolling();
    // Also do a direct attempt in case the hero is already there.
    setupHero();
  }

  document.addEventListener('DOMContentLoaded', start);
  window.addEventListener('load', start);
  window.addEventListener('pageshow', start);
})();
    </script>
    <script>
(function () {
  var RELOAD_ROUTES = [
    "/",
    "/services",
    "/about",
    "/technology",
    "/industries",
    "/why",
    "/why-argus",
    "/contact",
    "/get-started",
    "/careers",
    "/privacy",
    "/terms",
    "/thank-you",
    "/experience-blue",
    "/experience-red"
  ];

  function normalizePath(href) {
    if (!href) return "";
    var h = href.split("#")[0].split("?")[0];
    h = h.replace(/\.html$/i, "");
    h = h.replace(/\/+$/g, "");
    return h === "" ? "/" : h;
  }

  function shouldForceFullReload(href) {
    if (!href) return false;
    var h = href.trim();
    if (!h || h[0] === "#") return false;

    // Ignore external links (http:, mailto:, etc.)
    if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(h)) return false;

    // Support relative paths like "services.html"
    if (h[0] !== "/") h = "/" + h;

    var path = normalizePath(h);
    return RELOAD_ROUTES.indexOf(path) !== -1;
  }

  document.addEventListener(
    "click",
    function (e) {
      var target = e.target;
      if (!target || !target.closest) return;

      var a = target.closest("a[href]");
      if (!a) return;

      var href = a.getAttribute("href");
      if (!shouldForceFullReload(href)) return;

      e.preventDefault();
      e.stopPropagation();
      window.location.href = href;
    },
    true
  );
})();
</script>
